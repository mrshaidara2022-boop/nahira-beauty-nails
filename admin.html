<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Atelier — Administration Nahira</title>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="boutique.css">
<style>
  .onglets-admin{display:flex; gap:8px; margin:26px 0; flex-wrap:wrap}
  .ong{
    cursor:pointer; padding:11px 20px;
    font-family:'Montserrat',sans-serif; font-size:.72rem; letter-spacing:.16em; text-transform:uppercase;
    color:var(--texte-doux); border:1px solid var(--ligne); border-radius:99px; transition:all .25s;
  }
  .ong.active{background:var(--or); border-color:var(--or); color:#1a1208; font-weight:600}
  .ong .compteur{
    background:var(--rose); color:var(--noir); border-radius:99px;
    padding:1px 7px; font-size:.66rem; margin-left:6px; font-weight:600;
  }
  .vue{display:none}
  .vue.active{display:block}
  .stats-grille{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px}
  .stat{background:var(--carte); border:1px solid var(--ligne); border-radius:14px; padding:18px}
  .stat .valeur{font-size:1.9rem; color:var(--or-vif)}
  .stat .libelle{font-family:'Montserrat',sans-serif; font-size:.64rem; letter-spacing:.16em; text-transform:uppercase; color:var(--texte-doux); margin-top:4px}
  .bloc{background:var(--carte); border:1px solid var(--ligne); border-radius:14px; padding:18px 20px; margin-bottom:14px}
  .bloc .entete{display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; align-items:center}
  .pastille{
    font-family:'Montserrat',sans-serif; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase;
    padding:4px 12px; border-radius:99px; border:1px solid;
  }
  .pastille.paid,.pastille.preparing{color:#8be3ad; border-color:rgba(110,231,160,.4)}
  .pastille.shipped{color:var(--or-vif); border-color:var(--or)}
  .pastille.pending{color:var(--texte-doux); border-color:var(--ligne)}
  .pastille.cancelled,.pastille.refunded{color:#f0a3a3; border-color:rgba(240,111,111,.35)}
  .meta{font-family:'Montserrat',sans-serif; font-size:.74rem; color:var(--texte-doux); letter-spacing:.04em; line-height:1.8}
  .meta strong{color:var(--blanc); font-weight:500}
  .actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
  .mini-btn{
    cursor:pointer; border:none; border-radius:99px; padding:9px 16px;
    font-family:'Montserrat',sans-serif; font-size:.66rem; letter-spacing:.14em; text-transform:uppercase;
  }
  .mb-vert{background:rgba(110,231,160,.15); color:#8be3ad; border:1px solid rgba(110,231,160,.4)}
  .mb-rouge{background:rgba(240,111,111,.12); color:#f0a3a3; border:1px solid rgba(240,111,111,.35)}
  .mb-or{background:rgba(232,194,122,.14); color:var(--or-vif); border:1px solid var(--or)}
  .mini-input{
    background:var(--noir-2); border:1px solid var(--ligne); border-radius:99px;
    padding:8px 14px; color:var(--blanc); font-family:'Montserrat',sans-serif; font-size:.74rem; min-width:180px;
  }
  .avis-media img{max-width:120px; border-radius:10px; margin-top:8px; border:1px solid var(--ligne)}
  .avis-media video{max-width:200px; border-radius:10px; margin-top:8px; display:block}
  /* ---- Analytics ---- */
  .stat-inline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(232,194,122,.08);font-family:'Montserrat',sans-serif;font-size:.78rem}
  .stat-inline:last-child{border-bottom:none}
  .stat-inline .nom{color:var(--texte-doux)}
  .stat-inline .val{color:var(--blanc);font-weight:500;white-space:nowrap;margin-left:12px}
  .barre-inline{height:3px;background:linear-gradient(90deg,var(--or),var(--rose));border-radius:3px;margin-top:4px;min-width:2px}
  .horaire-grid{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;align-items:flex-end;height:56px;margin:12px 0 4px}
  .h-bar{background:rgba(232,194,122,.25);border-radius:2px 2px 0 0;min-height:2px}
  .h-bar.pic{background:linear-gradient(180deg,var(--or),rgba(232,194,122,.25))}
  .h-labels{display:flex;justify-content:space-between;font-family:'Montserrat',sans-serif;font-size:.6rem;color:var(--texte-faible);letter-spacing:.04em}
  .tendance-grille{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;align-items:flex-end;height:64px;margin:12px 0 4px}
  .j-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;height:100%}
  .j-bar{width:100%;background:rgba(240,111,167,.3);border-radius:3px 3px 0 0;min-height:2px}
  .j-label{font-family:'Montserrat',sans-serif;font-size:.6rem;color:var(--texte-faible);text-align:center;line-height:1.3}
  .j-count{font-family:'Montserrat',sans-serif;font-size:.7rem;color:var(--blanc);font-weight:500}
  .visite-ligne{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(232,194,122,.08);font-size:.8rem;flex-wrap:wrap}
  .visite-ligne:last-child{border-bottom:none}
  .vl-heure{color:var(--texte-faible);font-family:'Montserrat',sans-serif;font-size:.66rem;min-width:80px;flex:none}
  .vl-page{color:var(--texte-doux);flex:1;min-width:80px}
  .vl-src{color:var(--or-vif);font-family:'Montserrat',sans-serif;font-size:.66rem;flex:none}
  .vl-pays{color:var(--texte-faible);font-family:'Montserrat',sans-serif;font-size:.66rem;flex:none}
  .an-titre{font-family:'Montserrat',sans-serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blanc);margin-bottom:10px;display:block}
</style>
</head>
<body>

<nav class="b-nav">
  <div class="b-nav-inner">
    <ul class="b-links"><li><a href="index.html">← Boutique</a></li></ul>
    <a href="index.html" class="b-logo">
      <span class="l1">Nahira <span>Beauty</span></span>
      <span class="l2">Atelier</span>
    </a>
    <ul class="b-links"><li><a href="#" id="lien-sortie">Déconnexion</a></li></ul>
  </div>
</nav>

<main class="b-page">
  <div id="garde" style="text-align:center; padding:70px 20px">
    <p class="b-eyebrow">Espace privé</p>
    <h1 class="b-titre">Atelier <span class="b-script">✦</span></h1>
    <p style="color:var(--texte-doux); margin:14px 0 24px" id="garde-msg">Vérification de l'accès…</p>
    <a class="btn btn-ghost" href="compte.html" id="garde-btn" style="display:none">Se connecter</a>
  </div>

  <div id="tableau" style="display:none">
    <p class="b-eyebrow">Espace privé</p>
    <h1 class="b-titre">Bonjour, l'Atelier vous attend <span class="b-script">✦</span></h1>

    <div class="onglets-admin">
      <div class="ong active" data-v="commandes">Commandes <span class="compteur" id="c-commandes"></span></div>
      <div class="ong" data-v="avis">Avis <span class="compteur" id="c-avis"></span></div>
      <div class="ong" data-v="couture">Couture <span class="compteur" id="c-couture"></span></div>
      <div class="ong" data-v="stats">Statistiques</div>
    </div>

    <div class="vue active" id="vue-commandes"><p class="skeleton">Chargement…</p></div>
    <div class="vue" id="vue-avis"><p class="skeleton">Chargement…</p></div>
    <div class="vue" id="vue-couture"><p class="skeleton">Chargement…</p></div>
    <div class="vue" id="vue-stats"><p class="skeleton">Chargement…</p></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="boutique.js"></script>
<script>
const sb = NAHIRA.sb;
const STATUTS = {
  pending: "En attente", paid: "Payée — à préparer", preparing: "En préparation",
  shipped: "Expédiée", cancelled: "Annulée", refunded: "Remboursée",
};

document.getElementById("lien-sortie").addEventListener("click", async (e) => {
  e.preventDefault(); await sb.auth.signOut(); location.href = "compte.html";
});

document.querySelectorAll(".ong").forEach(o => {
  o.addEventListener("click", () => {
    document.querySelectorAll(".ong").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".vue").forEach(x => x.classList.remove("active"));
    o.classList.add("active");
    document.getElementById("vue-" + o.dataset.v).classList.add("active");
  });
});

/* ===== COMMANDES ===== */
async function chargerCommandes() {
  const zone = document.getElementById("vue-commandes");
  const { data, error } = await sb.from("orders")
    .select("*, order_items(*, products(name), product_units:unit_id(serial_number))")
    .neq("status", "pending")
    .order("created_at", { ascending: false });
  if (error) { zone.innerHTML = "<p class='skeleton'>Erreur de chargement.</p>"; return; }
  const actives = (data || []).filter(c => ["paid","preparing"].includes(c.status));
  document.getElementById("c-commandes").textContent = actives.length || "";
  if (!data || data.length === 0) {
    zone.innerHTML = "<p style='color:var(--texte-doux)'>Aucune commande pour le moment. Le drop arrive… ✦</p>"; return;
  }
  zone.innerHTML = "";
  data.forEach(cmd => {
    const d = new Date(cmd.created_at).toLocaleDateString("fr-FR", { day:"numeric", month:"long", hour:"2-digit", minute:"2-digit" });
    const articles = (cmd.order_items || []).map(it =>
      "• " + (it.products?.name || "Set") +
      (it.product_units?.serial_number ? " N°" + it.product_units.serial_number + "/5" : "") +
      " — taille <strong>" + it.size + "</strong>" +
      (it.custom_measurements ? "<br>&nbsp;&nbsp;Mesures : " + it.custom_measurements.replace(/</g,"&lt;") : "")
    ).join("<br>");
    const adresse = [cmd.shipping_name, cmd.shipping_address, (cmd.shipping_postal_code||"") + " " + (cmd.shipping_city||""), cmd.shipping_country]
      .filter(Boolean).join(", ");
    const div = document.createElement("div");
    div.className = "bloc";
    div.innerHTML =
      '<div class="entete"><strong style="color:var(--blanc)">' + d + '</strong>' +
      '<span class="pastille ' + cmd.status + '">' + (STATUTS[cmd.status] || cmd.status) + '</span></div>' +
      '<div class="meta">' + articles +
      '<br><strong>Total :</strong> ' + NAHIRA.eur(cmd.total_cents) +
      ' (livraison ' + NAHIRA.eur(cmd.shipping_cents) + ')' +
      '<br><strong>Email :</strong> ' + (cmd.email || "—") +
      '<br><strong>Adresse :</strong> ' + (adresse || "—") +
      (cmd.tracking_number ? '<br><strong>Suivi :</strong> ' + cmd.tracking_number : '') + '</div>' +
      '<div class="actions">' +
      (cmd.status === "paid" ? '<button class="mini-btn mb-or" data-act="preparing" data-id="' + cmd.id + '">→ En préparation</button>' : '') +
      (["paid","preparing"].includes(cmd.status) ?
        '<input class="mini-input" placeholder="N° de suivi La Poste" id="suivi-' + cmd.id + '" value="' + (cmd.tracking_number || "") + '">' +
        '<button class="mini-btn mb-vert" data-act="shipped" data-id="' + cmd.id + '">✓ Expédiée</button>' : '') +
      '</div>';
    zone.appendChild(div);
  });
  zone.querySelectorAll("[data-act]").forEach(b => {
    b.addEventListener("click", async () => {
      const maj = { status: b.dataset.act };
      const suivi = document.getElementById("suivi-" + b.dataset.id);
      if (suivi && suivi.value.trim()) maj.tracking_number = suivi.value.trim();
      await sb.from("orders").update(maj).eq("id", b.dataset.id);
      chargerCommandes();
    });
  });
}

/* ===== AVIS ===== */
async function chargerAvis() {
  const zone = document.getElementById("vue-avis");
  const { data, error } = await sb.from("reviews")
    .select("*, products(name)")
    .order("created_at", { ascending: false });
  if (error) { zone.innerHTML = "<p class='skeleton'>Erreur de chargement.</p>"; return; }
  const enAttente = (data || []).filter(a => a.status === "pending");
  document.getElementById("c-avis").textContent = enAttente.length || "";
  if (!data || data.length === 0) {
    zone.innerHTML = "<p style='color:var(--texte-doux)'>Aucun avis déposé pour le moment.</p>"; return;
  }
  zone.innerHTML = "";
  const ETIQ = { pending: "À modérer", approved: "Publié", rejected: "Retiré" };
  const CL = { pending: "pending", approved: "paid", rejected: "cancelled" };
  data.sort((a,b) => (a.status === "pending" ? -1 : 1) - (b.status === "pending" ? -1 : 1));
  data.forEach(a => {
    const d = new Date(a.created_at).toLocaleDateString("fr-FR", { day:"numeric", month:"long" });
    const div = document.createElement("div");
    div.className = "bloc";
    div.innerHTML =
      '<div class="entete"><strong style="color:var(--blanc)">' + a.author_name.replace(/</g,"&lt;") +
      ' <span style="color:var(--or-vif)">' + NAHIRA.etoiles(a.rating) + '</span></strong>' +
      '<span class="pastille ' + CL[a.status] + '">' + ETIQ[a.status] + '</span></div>' +
      '<div class="meta"><strong>' + (a.products?.name || "") + '</strong> · ' + d + ' · ' + a.email.replace(/</g,"&lt;") + '</div>' +
      '<p style="color:var(--texte-doux); margin-top:8px">' + a.comment.replace(/</g,"&lt;") + '</p>' +
      '<div class="avis-media">' +
      (a.photo_url ? '<img src="' + a.photo_url + '">' : '') +
      (a.video_url ? '<video src="' + a.video_url + '" controls preload="metadata"></video>' : '') + '</div>' +
      '<div class="actions">' +
      (a.status !== "approved" ? '<button class="mini-btn mb-vert" data-st="approved" data-id="' + a.id + '">✓ Publier</button>' : '') +
      (a.status !== "rejected" ? '<button class="mini-btn mb-rouge" data-st="rejected" data-id="' + a.id + '">Retirer</button>' : '') +
      '<button class="mini-btn mb-rouge" data-del="' + a.id + '">Supprimer définitivement</button>' +
      '</div>';
    zone.appendChild(div);
  });
  zone.querySelectorAll("[data-st]").forEach(b => b.addEventListener("click", async () => {
    await sb.from("reviews").update({ status: b.dataset.st }).eq("id", b.dataset.id);
    chargerAvis();
  }));
  zone.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", async () => {
    if (!confirm("Supprimer définitivement cet avis ?")) return;
    await sb.from("reviews").delete().eq("id", b.dataset.del);
    chargerAvis();
  }));
}

/* ===== COMMANDES COUTURE ===== */
async function chargerCouture() {
  const zone = document.getElementById("vue-couture");
  const { data, error } = await sb.from("couture_requests").select("*").order("created_at", { ascending: false });
  if (error) { zone.innerHTML = "<p class='skeleton'>Erreur de chargement.</p>"; return; }
  const enAttente = (data || []).filter(c => c.status === "pending");
  document.getElementById("c-couture").textContent = enAttente.length || "";
  if (!data || data.length === 0) {
    zone.innerHTML = "<p style='color:var(--texte-doux)'>Aucune demande Couture pour le moment.</p>"; return;
  }
  const ETIQ = { pending: "À étudier", accepted: "Acceptée", declined: "Déclinée" };
  const CL = { pending: "pending", accepted: "paid", declined: "cancelled" };
  zone.innerHTML = "";
  data.forEach(c => {
    const d = new Date(c.created_at).toLocaleDateString("fr-FR", { day:"numeric", month:"long" });
    let fiche = "";
    try {
      const f = JSON.parse(c.ai_brief || "null");
      if (f) fiche = '<div class="meta" style="border-left:2px solid var(--or); padding-left:12px; margin-top:8px">' +
        '<strong>« ' + f.titre + ' »</strong><br>' + f.vision + '<br>• ' + (f.elements || []).join("<br>• ") + '</div>';
    } catch(e) {}
    const div = document.createElement("div");
    div.className = "bloc";
    div.innerHTML =
      '<div class="entete"><strong style="color:var(--blanc)">' + c.name.replace(/</g,"&lt;") + '</strong>' +
      '<span class="pastille ' + CL[c.status] + '">' + ETIQ[c.status] + '</span></div>' +
      '<div class="meta">' + d + ' · ' + c.email.replace(/</g,"&lt;") + (c.budget ? ' · Budget : <strong>' + c.budget + '</strong>' : '') + '</div>' +
      '<p style="color:var(--texte-doux); margin-top:8px">' + c.brief.replace(/</g,"&lt;") + '</p>' + fiche +
      '<div class="actions">' +
      '<a class="mini-btn mb-or" style="text-decoration:none" href="mailto:' + c.email + '?subject=Votre Commande Couture — Atelier Nahira ✦">✉ Répondre</a>' +
      (c.status !== "accepted" ? '<button class="mini-btn mb-vert" data-cst="accepted" data-id="' + c.id + '">✓ Accepter</button>' : '') +
      (c.status !== "declined" ? '<button class="mini-btn mb-rouge" data-cst="declined" data-id="' + c.id + '">Décliner</button>' : '') +
      '</div>';
    zone.appendChild(div);
  });
  zone.querySelectorAll("[data-cst]").forEach(b => b.addEventListener("click", async () => {
    await sb.from("couture_requests").update({ status: b.dataset.cst }).eq("id", b.dataset.id);
    chargerCouture();
  }));
}

/* ===== STATISTIQUES ===== */
function _nomPage(path) {
  const p = (path || "").split("?")[0];
  const m = { "/":"Accueil", "/index.html":"Accueil", "/collection.html":"Collection",
    "/taille.html":"Guide Taille", "/couture.html":"Couture", "/panier.html":"Panier",
    "/compte.html":"Compte", "/merci.html":"Confirmation ✦" };
  if (p.includes("piece.html") || p.includes("produit.html")) return "Fiche Produit";
  return m[p] || p;
}
function _tempsRelatif(d) {
  const diff = Date.now() - new Date(d).getTime();
  if (diff < 60000) return "À l'instant";
  if (diff < 3600000) return "Il y a " + Math.round(diff/60000) + " min";
  if (diff < 86400000) return "Il y a " + Math.round(diff/3600000) + "h";
  return new Date(d).toLocaleDateString("fr-FR", { day:"numeric", month:"short" });
}
function _srcLabel(ref) {
  if (!ref) return "Direct";
  if (/instagram|ig\.me|l\.instagram/.test(ref)) return "Instagram";
  if (/tiktok/.test(ref)) return "TikTok";
  if (/google/.test(ref)) return "Google";
  if (/facebook|fb\.com/.test(ref)) return "Facebook";
  if (ref.includes("nahirabeautynails")) return "Interne";
  return "Autre";
}

async function chargerStats() {
  const zone = document.getElementById("vue-stats");
  zone.innerHTML = '<p class="skeleton">Chargement des statistiques…</p>';

  const [cmdsRes, viewsRes, attenteRes] = await Promise.all([
    sb.from("orders").select("total_cents,status,created_at").in("status",["paid","preparing","shipped"]),
    sb.from("page_views").select("path,ref,created_at,country").order("created_at",{ascending:false}).limit(2000),
    sb.from("waitlist").select("email").order("created_at",{ascending:false})
  ]);

  const cmds = cmdsRes.data || [];
  const views = viewsRes.data || [];
  const attente = attenteRes.data || [];
  const stock = await NAHIRA.getAllStock();

  const revenus = cmds.reduce((s,c) => s + c.total_cents, 0);
  const stockTotal = Object.values(stock).reduce((s,n) => s + n, 0);

  const now = Date.now();
  const views7j = views.filter(v => now - new Date(v.created_at).getTime() < 7*24*3600*1000);

  // Pages
  const byPage = {};
  views.forEach(v => { const k = _nomPage(v.path); byPage[k] = (byPage[k]||0)+1; });
  const topPages = Object.entries(byPage).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxPage = topPages[0] ? topPages[0][1] : 1;

  // Sources
  const bySrc = {};
  views.forEach(v => { const k = _srcLabel(v.ref); bySrc[k] = (bySrc[k]||0)+1; });
  const topSrc = Object.entries(bySrc).sort((a,b)=>b[1]-a[1]);
  const totalSrc = Math.max(views.length, 1);

  // Pays
  const byCountry = {};
  views.forEach(v => { if (v.country) byCountry[v.country] = (byCountry[v.country]||0)+1; });
  const topCountries = Object.entries(byCountry).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCountry = topCountries[0] ? topCountries[0][1] : 1;

  // Horaires
  const byHour = Array(24).fill(0);
  views.forEach(v => { byHour[new Date(v.created_at).getHours()]++; });
  const maxH = Math.max(...byHour, 1);
  const heureMax = byHour.indexOf(Math.max(...byHour));

  // Tendance 7 jours
  const jours = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(now - i*24*3600*1000);
    jours.push({ label: d.toLocaleDateString("fr-FR",{weekday:"short"}), count: 0 });
  }
  views7j.forEach(v => {
    const diff = Math.floor((now - new Date(v.created_at).getTime()) / (24*3600*1000));
    if (diff >= 0 && diff < 7) jours[6-diff].count++;
  });
  const maxJ = Math.max(...jours.map(j=>j.count), 1);

  let h = "";

  // ── KPI ──
  h += '<div class="stats-grille">' +
    '<div class="stat"><div class="valeur">'+NAHIRA.eur(revenus)+'</div><div class="libelle">Chiffre d\'affaires</div></div>' +
    '<div class="stat"><div class="valeur">'+cmds.length+'</div><div class="libelle">Commandes</div></div>' +
    '<div class="stat"><div class="valeur">'+(15-stockTotal)+' / 15</div><div class="libelle">Sets vendus</div></div>' +
    '<div class="stat"><div class="valeur">'+views7j.length+'</div><div class="libelle">Visites — 7 jours</div></div>' +
    '<div class="stat"><div class="valeur">'+views.length+'</div><div class="libelle">Visites — total</div></div>' +
    '<div class="stat"><div class="valeur">'+attente.length+'</div><div class="libelle">Liste d\'attente</div></div>' +
    '</div>';

  // ── Tendance 7j ──
  h += '<div class="bloc"><span class="an-titre">Tendance — 7 jours</span><div class="tendance-grille">';
  jours.forEach(j => {
    const pct = Math.max(j.count / maxJ * 100, 3);
    h += '<div class="j-col"><div class="j-count">'+j.count+'</div><div class="j-bar" style="height:'+pct+'%"></div></div>';
  });
  h += '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">';
  jours.forEach(j => { h += '<div class="j-label">'+j.label+'</div>'; });
  h += '</div></div>';

  // ── Répartition horaire ──
  h += '<div class="bloc"><span class="an-titre">Répartition horaire <span style="color:var(--or-vif);font-weight:600">pic à '+heureMax+'h</span></span>';
  h += '<div class="horaire-grid">';
  byHour.forEach((n,i) => {
    const pct = Math.max(n / maxH * 100, 3);
    h += '<div class="h-bar'+(i===heureMax?' pic':'')+' style="height:'+pct+'%"></div>';
  });
  h += '</div><div class="h-labels"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div></div>';

  // ── 3 colonnes : Pages / Sources / Pays ──
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:14px">';

  // Pages
  h += '<div class="bloc" style="margin:0"><span class="an-titre">Pages visitées</span>';
  topPages.forEach(([p,n]) => {
    h += '<div class="stat-inline"><div style="flex:1;min-width:0"><div class="nom" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p+'</div>' +
         '<div class="barre-inline" style="width:'+Math.round(n/maxPage*100)+'%"></div></div>' +
         '<div class="val">'+n+'</div></div>';
  });
  if (!topPages.length) h += '<p style="color:var(--texte-faible)">Aucune donnée</p>';
  h += '</div>';

  // Sources
  h += '<div class="bloc" style="margin:0"><span class="an-titre">Sources</span>';
  topSrc.forEach(([s,n]) => {
    const pct = Math.round(n/totalSrc*100);
    h += '<div class="stat-inline"><div class="nom">'+s+'</div><div class="val">'+pct+'% <span style="color:var(--texte-faible)">('+n+')</span></div></div>';
  });
  h += '</div>';

  // Pays
  h += '<div class="bloc" style="margin:0"><span class="an-titre">Pays</span>';
  if (topCountries.length) {
    topCountries.forEach(([c,n]) => {
      h += '<div class="stat-inline"><div style="flex:1;min-width:0"><div class="nom">'+c+'</div>' +
           '<div class="barre-inline" style="width:'+Math.round(n/maxCountry*100)+'%"></div></div>' +
           '<div class="val">'+n+'</div></div>';
    });
  } else {
    h += '<p style="color:var(--texte-faible);font-size:.8rem">Données en cours de collecte sur les prochaines visites.</p>';
  }
  h += '</div>';
  h += '</div>'; // fin 3 colonnes

  // ── Dernières visites ──
  h += '<div class="bloc"><span class="an-titre">Dernières visites</span>';
  if (views.length) {
    views.slice(0, 25).forEach(v => {
      h += '<div class="visite-ligne">' +
        '<div class="vl-heure">'+_tempsRelatif(v.created_at)+'</div>' +
        '<div class="vl-page">'+_nomPage(v.path)+'</div>' +
        '<div class="vl-src">'+_srcLabel(v.ref)+'</div>' +
        (v.country ? '<div class="vl-pays">'+v.country+'</div>' : '') +
        '</div>';
    });
  } else {
    h += '<p style="color:var(--texte-faible)">Aucune visite enregistrée.</p>';
  }
  h += '</div>';

  // ── Stock ──
  h += '<div class="bloc"><div class="meta"><strong>Stock restant :</strong><br>' +
    '• Lait de Lune : '+(stock["lait-de-lune"]??"—")+' / 5<br>' +
    '• French Or Fin : '+(stock["french-or-fin"]??"—")+' / 5<br>' +
    '• Orage d\'Or : '+(stock["orage-dor"]??"—")+' / 5</div></div>';

  if (attente.length) {
    h += '<div class="bloc"><div class="meta"><strong>Liste d\'attente Drop 002 :</strong><br>' +
      attente.map(a => a.email.replace(/</g,"&lt;")).join("<br>") + '</div></div>';
  }

  zone.innerHTML = h;
}

/* ===== GARDE D'ACCÈS ===== */
(async function(){
  const sess = await sb.auth.getSession();
  const user = sess.data && sess.data.session && sess.data.session.user;
  const msg = document.getElementById("garde-msg");
  const btn = document.getElementById("garde-btn");
  if (!user) {
    msg.textContent = "Connectez-vous d'abord avec votre compte, puis revenez sur cette page.";
    btn.style.display = "inline-block"; return;
  }
  const { data: adminData } = await sb.from("admins").select("user_id").eq("user_id", user.id).maybeSingle();
  const ok = !!adminData;
  if (!ok) {
    msg.textContent = "Accès réservé à la fondatrice. Cette tentative a été notée. ✦"; return;
  }
  document.getElementById("garde").style.display = "none";
  document.getElementById("tableau").style.display = "block";
  chargerCommandes(); chargerAvis(); chargerCouture(); chargerStats();
})();
</script>
</body>
